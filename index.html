<html>
  <head>
    <title>VIC price chart</title>

	  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://unpkg.com/moralis@0.0.64/dist/moralis.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.1/moment.min.js"></script>



  </head>

  <body>

    <input type="radio" name="time" id="week" value=7 checked>7</input>
    <input type="radio" name="time" id="2week" value=14 >14</input>
    <input type="radio" name="time" id="4week" value=30 >30</input>
    <div>
      <canvas id="myChart" height="80px" width="200px"></canvas>
    </div>
    
  <script>

    //ADD Your moralis AddID and Serve Url HERE:
    Moralis.initialize("XbnX0GTytpx4LcCjyMvAMaYR8y8xRDYNDATbr4ST");
    Moralis.serverURL = "https://egsltjfxduqh.usemoralis.com:2053/server";

    async function launch(){
    

    priceHistory()
    }

    launch()

    async function priceHistory() {

      let days = document.querySelector('input[name="time"]:checked').value;

      let dates1 = Array(Number(days)).fill().map((e,i) => 
      moment().subtract(i, "d").format("YYYY-MM-DD")
      ).reverse()

      let blocks1 = await Promise.all(dates1.map(async(e,i) => 
      await Moralis.Web3API.native.getDateToBlock({date:e})
      ))

      let vicOpt = {
        address: "0xcc52912f01ea696f5713c4f54ed23375da47e815",
        chain: "bsc",
        exchange: "PancakeSwapv2"
      }

      let prices1 = await Promise.all(blocks1.map(async(e,i) => 
      await Moralis.Web3API.token.getTokenPrice(vicOpt, {to_block: e.block})
      ))

      prices1 = await prices1.map(e => e.usdPrice)

      console.log(dates1)
      console.log(blocks1)
      console.log(prices1)
      
      const data = {
        labels: dates1,
        datasets: [{
        label: "VIC20",
        backgroundColor: 'rgb(0,0, 0)',
        fill: false,
        borderColor: 'rgb(20, 22, 26)',
        data:prices1,
        }]
      };

      const config = {
        type: 'line',
        data: data,
        options: {}
      };

      if(window.myChart instanceof Chart){
        myChart.destroy()
      }

      window.myChart = new Chart(
        document.getElementById('myChart'),
        config
      );

    }
    
      document.getElementById("week").onclick = priceHistory;
      document.getElementById("2week").onclick = priceHistory;
      document.getElementById("4week").onclick = priceHistory;

    </script>


  </body>


</html>
